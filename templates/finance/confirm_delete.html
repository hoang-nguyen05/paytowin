{% extends "base.html" %}
{% block title %}Xác nhận xoá{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h5 mb-3">Xoá đối tượng?</h1>
          <p class="text-muted">Thao tác này không thể hoàn tác.</p>
          <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
              <button class="btn btn-danger">Xoá</button>
              <a class="btn btn-outline-secondary" href="{% url back_url %}">Huỷ</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
