{% extends "base.html" %}
{% block title %}Quên mật khẩu{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3">Quên mật khẩu</h1>
          <p class="text-muted">Nhập email để nhận link đặt lại mật khẩu (môi trường dev sẽ in email ra console).</p>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100">Gửi</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
