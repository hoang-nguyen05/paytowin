{% extends "base.html" %}
{% block title %}Đăng ký{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3">Đăng ký</h1>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100">Tạo tài khoản</button>
          </form>
          <div class="mt-3">
            <a href="{% url 'login' %}">Đã có tài khoản? Đăng nhập</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
