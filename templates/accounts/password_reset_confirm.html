{% extends "base.html" %}
{% block title %}Đặt lại mật khẩu{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3">Đặt lại mật khẩu</h1>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100">Cập nhật</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
