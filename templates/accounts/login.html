{% extends "base.html" %}
{% block title %}Đăng nhập{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3">Đăng nhập</h1>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100">Đăng nhập</button>
          </form>
          <div class="mt-3 d-flex justify-content-between">
            <a href="{% url 'register' %}">Tạo tài khoản</a>
            <a href="{% url 'password_reset' %}">Quên mật khẩu</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
